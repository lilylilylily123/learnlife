; LearnLife NFC Attender — standalone firmware
;
; Two environments:
;   esp32dev — production target (ESP32-WROOM-32 + PN532 + OLED + DS3231)
;   native   — host build for state-machine unit tests (no MCU needed)

[platformio]
default_envs = esp32dev

[env]
test_framework = unity

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
build_unflags = -std=gnu++11
lib_deps =
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/RTClib@^2.1.4
    bblanchon/ArduinoJson@^7.2.0

; Host-side build for pure unit tests of state_machine.
; No Arduino headers; only files in src/ that compile against the C++ stdlib.
[env:native]
platform = native
build_flags =
    -std=gnu++17
    -I src
    -DLLATTENDER_NATIVE_BUILD
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
; Pure-stdlib modules build on the host; everything else pulls in Arduino.h
; and is excluded. Each entry here corresponds to a test_* directory below.
build_src_filter = -<*> +<state_machine.cpp> +<fields.cpp> +<pb_request.cpp> +<queue_format.cpp> +<pb_response.cpp> +<attendance_adapter.cpp>
; Tell pio-test to compile src/ alongside the test files — otherwise the
; tests fail to link the symbols they reference.
test_build_src = yes
test_filter = test_state_machine, test_fields, test_pb_request, test_queue_format, test_pb_response, test_attendance_adapter

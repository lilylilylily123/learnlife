<!-- Script to simulate scroll effect on header -->
<script>
        const header = document.getElementById('main-header');
        const greeting = document.getElementById('greeting-text');
        const main = document.querySelector('main');

        main.addEventListener('scroll', () => {
            if (main.scrollTop > 20) {
                header.classList.replace('pt-12', 'pt-6');
                header.classList.replace('pb-4', 'pb-3');
                greeting.classList.replace('text-[32px]', 'text-[24px]');
                header.classList.add('shadow-sm');
            } else {
                header.classList.replace('pt-6', 'pt-12');
                header.classList.replace('pb-3', 'pb-4');
                greeting.classList.replace('text-[24px]', 'text-[32px]');
                header.classList.remove('shadow-sm');
            }
        });
    </script>
